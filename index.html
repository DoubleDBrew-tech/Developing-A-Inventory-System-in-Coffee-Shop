<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Our Special Space</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-pink: #ff4b72;
            --dark-pink: #d9385c;
            --bg-dark: #121216;
            --card-dark: #1e1e24;
        }

        body {
            background-color: var(--bg-dark);
            font-family: 'Poppins', sans-serif;
            color: #f3f4f6;
            overflow-x: hidden;
            margin: 0;
        }

        /* --- Welcome Screen --- */
        #welcomeScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            background: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.75)), 
                        url('https://images.unsplash.com/photo-1518199266791-5375a83190b7?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: opacity 0.8s ease-in-out;
        }

        .animated-text {
            font-family: 'Caveat', cursive;
            font-size: 5rem;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 75, 114, 0.6);
            margin-bottom: 2rem;
            min-height: 7.5rem;
            white-space: pre-wrap;
        }

        .btn-enter {
            background-color: var(--primary-pink);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1.2rem;
            border-radius: 50px;
            font-weight: 600;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(255, 75, 114, 0.4);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .btn-enter.show {
            opacity: 1;
            transform: translateY(0);
        }

        .btn-enter:hover {
            background-color: var(--dark-pink);
            color: white;
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 75, 114, 0.6);
        }

        /* --- Watch Party Application Interface --- */
        #app {
            display: grid;
            grid-template-columns: 320px 1fr;
            height: 100vh;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* Sidebar Drive Panel */
        .drive-sidebar {
            background-color: var(--card-dark);
            border-right: 1px solid #2d2d37;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .drive-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            margin-bottom: 1.5rem;
            padding-bottom: 10px;
            border-bottom: 1px solid #2d2d37;
        }

        .drive-header img {
            width: 24px;
            height: 24px;
        }

        .movie-list {
            overflow-y: auto;
            flex-grow: 1;
        }

        .movie-item {
            background: #25252e;
            border: 1px solid #333342;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .movie-item:hover {
            border-color: var(--primary-pink);
            background: #2b2b36;
        }

        /* Main Theater Content Area */
        .main-theater {
            display: flex;
            flex-direction: column;
            padding: 24px;
            overflow-y: auto;
        }

        .theater-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .video-container {
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            aspect-ratio: 16 / 9;
            width: 100%;
            max-height: 70vh;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .sync-indicator {
            background-color: rgba(255, 75, 114, 0.15);
            border: 1px solid var(--primary-pink);
            color: var(--primary-pink);
            font-size: 0.85rem;
            border-radius: 6px;
            padding: 6px 12px;
        }

        @media (max-width: 991px) {
            #app {
                grid-template-columns: 1fr;
                height: auto;
            }
            .drive-sidebar {
                height: 300px;
            }
        }
    </style>
</head>
<body>

<!-- Welcome Reveal Stage -->
<div id="welcomeScreen">
    <div class="animated-text" id="revealText"></div>
    <button class="btn btn-enter" id="enterBtn" onclick="enterApp()">Enter Our Space ❤️</button>
</div>

<!-- Main Co-Watching Space Application -->
<div id="app">
    <!-- Google Drive Media Navigator -->
    <aside class="drive-sidebar">
        <div class="drive-header">
            <!-- Google Drive Standard Mini Icon Branding -->
            <img src="https://upload.wikimedia.org/wikipedia/commons/1/12/Google_Drive_icon_%282020%29.svg" alt="Drive">
            <span>Leigh's Movie Drive</span>
        </div>
        
        <div class="mb-3">
            <label class="form-label small text-muted">Add New Shared Video URL</label>
            <div class="input-group input-group-sm">
                <input type="text" id="videoUrlInput" class="form-control bg-dark text-white border-secondary" placeholder="Paste Drive/Direct stream URL...">
                <button class="btn btn-outline-danger" onclick="addNewMovie()">Add</button>
            </div>
            <div class="form-text text-muted" style="font-size: 10px;">Ensure your Google Drive file is set to "Anyone with the link can view".</div>
        </div>

        <div class="movie-list" id="movieList">
            <!-- Dynamic Movie Assets Load Here -->
        </div>
    </aside>

    <!-- Room Screen Display Container -->
    <main class="main-theater">
        <header class="theater-nav">
            <div>
                <h4 class="mb-1" id="currentTrackTitle">No Video Loaded</h4>
                <p class="text-muted small mb-0">Rooms synchronize actions across sessions automatically.</p>
            </div>
            <div class="d-flex align-items-center gap-2">
                <span class="sync-indicator">● Live Synchronization Connected</span>
            </div>
        </header>

        <div class="video-container">
            <video id="sharedPlayer" controls playsinline>
                <source id="videoSource" src="" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </main>
</div>

<!-- Scripts -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script>
    // Initialize Firebase Database Integration Context
    firebase.initializeApp({
        apiKey: "AIzaSyA-nzm4JKM6QdwVxcVu6uWUeRy9n5hJZpU",
        authDomain: "inventory-system-67e2e.firebaseapp.com",
        projectId: "inventory-system-67e2e"
    });
    const db = firebase.firestore();
    const roomRef = db.collection("watch_party_room").doc("shared_session");

    // UI State & Typing Elements
    const targetPhrase = "I Love You Leighhhhh";
    let index = 0;
    let isInternalUpdate = false;

    // Trigger sequential animation processing loops on window load
    window.onload = function() {
        setTimeout(typeLetter, 600);
    };

    function typeLetter() {
        if (index < targetPhrase.length) {
            document.getElementById("revealText").innerHTML += targetPhrase.charAt(index);
            index++;
            setTimeout(typeLetter, 120 + Math.random() * 60); // Dynamic variable writing pacing
        } else {
            document.getElementById("enterBtn").classList.add("show");
        }
    }

    function enterApp() {
        const welcome = document.getElementById("welcomeScreen");
        const app = document.getElementById("app");
        
        welcome.style.opacity = "0";
        setTimeout(() => {
            welcome.style.display = "none";
            app.style.display = "grid";
            setTimeout(() => app.style.opacity = "1", 50);
            
            // Boot media streaming synchronization layers
            initPartyRoom();
        }, 800);
    }

    /* --- Co-Watch Party Room Coordination Infrastructure --- */
    const player = document.getElementById("sharedPlayer");

    // Default internal fallback database lists (Replace URLs below with actual Drive streaming sources if desired)
    let defaultMovies = [
        { id: "m1", title: "Our First Romantic Flick", url: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" },
        { id: "m2", title: "Leigh's Favorite Choice", url: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4" }
    ];

    function initPartyRoom() {
        renderMoviesList();

        // Listen for database playback adjustments from partner
        roomRef.onSnapshot(doc => {
            if (!doc.exists) {
                // Initialize clean room schema state
                roomRef.set({ currentTime: 0, playing: false, currentVideoId: "m1", title: defaultMovies[0].title, url: defaultMovies[0].url, lastUpdated: Date.now() });
                return;
            }

            const data = doc.data();
            
            // Update source track context state if modified remotely
            if (document.getElementById("videoSource").src !== data.url) {
                changeTrackSource(data.title, data.url, false);
            }

            // Sync structural parameters if drift variance exceeds standard tolerance metrics
            if (Math.abs(player.currentTime - data.currentTime) > 1.8) {
                isInternalUpdate = true;
                player.currentTime = data.currentTime;
            }

            if (data.playing && player.paused) {
                isInternalUpdate = true;
                player.play().catch(() => {});
            } else if (!data.playing && !player.paused) {
                isInternalUpdate = true;
                player.pause();
            }
        });

        // Event hooks monitoring local interactions to sync to cloud backend databases
        player.addEventListener("play", () => pushSyncState(true));
        player.addEventListener("pause", () => pushSyncState(false));
        player.addEventListener("seeked", () => pushSyncState(!player.paused));
    }

    function pushSyncState(isPlaying) {
        if (isInternalUpdate) {
            isInternalUpdate = false; // Block internal rendering cycles from looping back out to database
            return;
        }
        roomRef.update({
            currentTime: player.currentTime,
            playing: isPlaying,
            lastUpdated: Date.now()
        });
    }

    function renderMoviesList() {
        const container = document.getElementById("movieList");
        container.innerHTML = "";
        defaultMovies.forEach(movie => {
            container.innerHTML += `
                <div class="movie-item" onclick="selectMovie('${movie.title}', '${movie.url}')">
                    <div class="fw-bold text-truncate">${movie.title}</div>
                    <div class="small text-muted text-truncate" style="font-size: 11px;">${movie.url}</div>
                </div>
            `;
        });
    }

    function selectMovie(title, url) {
        changeTrackSource(title, url, true);
    }

    function changeTrackSource(title, url, shouldPushToDatabase) {
        document.getElementById("currentTrackTitle").innerText = title;
        const source = document.getElementById("videoSource");
        
        // Transform standard Google Drive page links into direct playback file links
        let streamUrl = url;
        if(url.includes("drive.google.com/file/d/")) {
            const fileId = url.split("/file/d/")[1].split("/")[0];
            streamUrl = `https://docs.google.com/uc?export=download&id=${fileId}`;
        }

        source.src = streamUrl;
        player.load();

        if (shouldPushToDatabase) {
            roomRef.update({
                title: title,
                url: streamUrl,
                currentTime: 0,
                playing: false,
                lastUpdated: Date.now()
            });
        }
    }

    function addNewMovie() {
        const input = document.getElementById("videoUrlInput");
        const url = input.value.trim();
        if (!url) return;

        const title = `Shared Stream #${defaultMovies.length + 1}`;
        const newTrack = { id: "custom_" + Date.now(), title: title, url: url };
        
        defaultMovies.push(newTrack);
        renderMoviesList();
        selectMovie(title, url);
        input.value = "";
    }
</script>

</body>
</html>
