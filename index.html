<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Our Special Space</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-pink: #ff4b72;
            --dark-pink: #d9385c;
            --bg-dark: #121216;
            --card-dark: #1e1e24;
        }

        body {
            background-color: var(--bg-dark);
            font-family: 'Poppins', sans-serif;
            color: #f3f4f6;
            overflow-x: hidden;
            margin: 0;
        }

        /* --- Welcome Screen --- */
        #welcomeScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            background: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.75)), 
                        url('https://images.unsplash.com/photo-1518199266791-5375a83190b7?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: opacity 0.8s ease-in-out;
        }

        .animated-text {
            font-family: 'Caveat', cursive;
            font-size: 5rem;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 75, 114, 0.6);
            margin-bottom: 2rem;
            min-height: 7.5rem;
            white-space: pre-wrap;
        }

        .btn-enter {
            background-color: var(--primary-pink);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1.2rem;
            border-radius: 50px;
            font-weight: 600;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(255, 75, 114, 0.4);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .btn-enter.show { opacity: 1; transform: translateY(0); }
        .btn-enter:hover {
            background-color: var(--dark-pink);
            color: white;
            transform: scale(1.05);
        }

        /* --- Application Layout --- */
        #app {
            display: grid;
            grid-template-columns: 350px 1fr;
            height: 100vh;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .sidebar {
            background-color: var(--card-dark);
            border-right: 1px solid #2d2d37;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6b7280;
            font-weight: 600;
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
        }

        .drive-btn {
            background: #25252e;
            border: 1px dashed #4b4b5e;
            color: #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            transition: all 0.2s ease;
            text-decoration: none !important;
        }

        .drive-btn:hover {
            border-color: #4285f4;
            background: rgba(66, 133, 244, 0.05);
            color: white;
        }

        /* Parties Room Cards */
        .party-card {
            background: #25252e;
            border: 1px solid #333342;
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 10px;
            transition: all 0.2s;
        }
        .party-card.active {
            border-color: var(--primary-pink);
            background: rgba(255, 75, 114, 0.03);
        }

        /* Main Screen Layout */
        .main-theater {
            display: flex;
            flex-direction: column;
            padding: 24px;
            overflow-y: auto;
        }

        .video-container {
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            aspect-ratio: 16 / 9;
            width: 100%;
        }

        video { width: 100%; height: 100%; object-fit: contain; }

        .status-pill {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<!-- Welcome Reveal Stage -->
<div id="welcomeScreen">
    <div class="animated-text" id="revealText"></div>
    <button class="btn btn-enter" id="enterBtn" onclick="enterApp()">Enter Our Space ❤️</button>
</div>

<!-- Main Co-Watching Space Application -->
<div id="app">
    <!-- Party Control & Drive Panel Sidebar -->
    <aside class="sidebar">
        <div class="d-flex align-items-center gap-3 mb-4">
            <div class="rounded-circle bg-danger d-inline-block" style="width:12px; height:12px; animate: pulse 2s infinite;"></div>
            <h5 class="mb-0 fw-bold">Rave Watch Hub</h5>
        </div>

        <!-- Google Drive Access Point -->
        <div class="section-title">Your Cloud Library</div>
        <a href="https://drive.google.com/" target="_blank" class="drive-btn mb-2">
            <img src="https://upload.wikimedia.org/wikipedia/commons/1/12/Google_Drive_icon_%282020%29.svg" alt="Drive" style="width:20px;">
            <span>Open Google Drive Target</span>
        </a>
        
        <!-- Live Rave Parties System Manager -->
        <div class="section-title">Watch Party Manager</div>
        <div class="d-grid gap-2 mb-3">
            <button class="btn btn-danger btn-sm py-2 fw-bold" onclick="createNewParty()">🎬 Host New Watch Session</button>
        </div>

        <div class="section-title">Available Active Host Rooms</div>
        <div id="activePartiesList">
            <div class="text-muted small text-center py-3">No active parties found. Click above to host!</div>
        </div>
    </aside>

    <!-- Room Theater Content Frame Area -->
    <main class="main-theater">
        <header class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h4 class="mb-1" id="roomTitleHeader">Viewing Lobby</h4>
                <div class="small text-muted" id="roomSubHeader">Join or create a live sync room to get started.</div>
            </div>
            <div id="syncStatusIndicator" class="status-pill bg-secondary text-white">Standalone Offline Mode</div>
        </header>

        <!-- Media Output Core Frame Element -->
        <div class="video-container mb-3">
            <video id="sharedPlayer" controls playsinline>
                <!-- Standard reliable public sample asset to test multi-terminal syncing speed -->
                <source id="videoSource" src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4">
            </video>
        </div>

        <!-- URL Update Bar within Active Room Contexts -->
        <div class="card bg-dark border-secondary p-3" id="mediaControllerCard" style="display: none;">
            <label class="form-label small text-muted fw-bold">Update Active Room Media Target URL</label>
            <div class="input-group">
                <input type="text" id="targetMediaUrl" class="form-control bg-secondary text-white border-0" placeholder="Paste your direct video link or Google Drive URL stream link...">
                <button class="btn btn-danger" onclick="updateRoomMedia()">Load Target</button>
            </div>
        </div>
    </main>
</div>

<!-- Scripts -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script>
    // Config Firebase Firestore Backends
    firebase.initializeApp({
        apiKey: "AIzaSyA-nzm4JKM6QdwVxcVu6uWUeRy9n5hJZpU",
        authDomain: "inventory-system-67e2e.firebaseapp.com",
        projectId: "inventory-system-67e2e"
    });
    const db = firebase.firestore();
    const player = document.getElementById("sharedPlayer");

    const targetPhrase = "I Love You Leighhhhh";
    let index = 0;
    let currentRoomId = null;
    let roomUnsubscribe = null;
    let isInternalUpdate = false;

    // UI Initializers Animation Sequences
    window.onload = function() { setTimeout(typeLetter, 500); };

    function typeLetter() {
        if (index < targetPhrase.length) {
            document.getElementById("revealText").innerHTML += targetPhrase.charAt(index);
            index++;
            setTimeout(typeLetter, 100);
        } else {
            document.getElementById("enterBtn").classList.add("show");
        }
    }

    function enterApp() {
        document.getElementById("welcomeScreen").style.opacity = "0";
        setTimeout(() => {
            document.getElementById("welcomeScreen").style.display = "none";
            document.getElementById("app").style.display = "grid";
            setTimeout(() => { document.getElementById("app").style.opacity = "1"; }, 50);
            listenForGlobalParties();
        }, 800);
    }

    /* --- Dynamic Rave-Style Multi-Room Hosting Operations --- */
    
    function listenForGlobalParties() {
        // Look for rooms active within the last 4 hours to keep the lobby fresh
        const activeThreshold = Date.now() - (4 * 60 * 60 * 1000);
        
        db.collection("rave_parties")
          .where("createdAt", ">", activeThreshold)
          .onSnapshot(snapshot => {
              const listContainer = document.getElementById("activePartiesList");
              listContainer.innerHTML = "";

              if(snapshot.empty) {
                  listContainer.innerHTML = `<div class="text-muted small text-center py-3">No active parties available.</div>`;
                  return;
              }

              snapshot.forEach(doc => {
                  const party = doc.data();
                  const isCurrent = (doc.id === currentRoomId);
                  listContainer.innerHTML += `
                      <div class="party-card ${isCurrent ? 'active' : ''}">
                          <div class="fw-bold text-truncate text-white">🎬 ${party.hostName}'s Session</div>
                          <div class="small text-muted mb-2" style="font-size:11px;">Active Track: ${party.mediaTitle || 'Sample Loop'}</div>
                          <button class="btn btn-sm w-100 ${isCurrent ? 'btn-outline-danger disabled' : 'btn-danger'}" 
                                  onclick="connectToPartyRoom('${doc.id}')">
                              ${isCurrent ? 'Connected' : 'Join Sync Party'}
                          </button>
                      </div>
                  `;
              });
          });
    }

    async function createNewParty() {
        const hostIdentity = prompt("Enter your name to host (e.g., Admin or Leigh):") || "Host";
        
        const newPartyRef = db.collection("rave_parties").doc();
        const partyPayload = {
            hostName: hostIdentity,
            mediaUrl: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4",
            mediaTitle: "Standard Synchronization Sample",
            currentTime: 0,
            playing: false,
            createdAt: Date.now(),
            lastUpdated: Date.now()
        };

        await newPartyRef.set(partyPayload);
        connectToPartyRoom(newPartyRef.id);
    }

    function connectToPartyRoom(roomId) {
        // Disconnect from existing subscriptions if changing channels
        if (roomUnsubscribe) roomUnsubscribe();
        currentRoomId = roomId;

        document.getElementById("mediaControllerCard").style.display = "block";
        const statusPill = document.getElementById("syncStatusIndicator");
        statusPill.className = "status-pill bg-danger text-white";
        statusPill.innerText = "● Linked Shared Session Room";

        // Listen for internal player state changes across room documents
        roomUnsubscribe = db.collection("rave_parties").doc(roomId).onSnapshot(doc => {
            if (!doc.exists) return;
            const data = doc.data();

            document.getElementById("roomTitleHeader").innerText = `${data.hostName}'s Watch Space`;
            document.getElementById("roomSubHeader").innerText = `Syncing Target: ${data.mediaTitle}`;

            // Sync video sources if updated
            if (document.getElementById("videoSource").src !== data.mediaUrl) {
                isInternalUpdate = true;
                document.getElementById("videoSource").src = data.mediaUrl;
                player.load();
            }

            // Correct playback drift variance metrics tolerances safely
            if (Math.abs(player.currentTime - data.currentTime) > 1.5) {
                isInternalUpdate = true;
                player.currentTime = data.currentTime;
            }

            // Sync play/pause states
            if (data.playing && player.paused) {
                isInternalUpdate = true;
                player.play().catch(() => {});
            } else if (!data.playing && !player.paused) {
                isInternalUpdate = true;
                player.pause();
            }
        });
    }

    // Capture user interface playback changes to send out to connected partner terminals
    player.addEventListener("play", () => broadcastPlayerState(true));
    player.addEventListener("pause", () => broadcastPlayerState(false));
    player.addEventListener("seeked", () => broadcastPlayerState(!player.paused));

    function broadcastPlayerState(isPlaying) {
        if (!currentRoomId) return;
        if (isInternalUpdate) {
            isInternalUpdate = false; // Block state response update echoes
            return;
        }

        db.collection("rave_parties").doc(currentRoomId).update({
            currentTime: player.currentTime,
            playing: isPlaying,
            lastUpdated: Date.now()
        });
    }

    function updateRoomMedia() {
        if(!currentRoomId) {
            alert("Please create or join a host party session before updating media.");
            return;
        }
        const rawUrl = document.getElementById("targetMediaUrl").value.trim();
        if (!rawUrl) return;

        let processedUrl = rawUrl;
        // Transform normal Google Drive viewing page links into direct playback streams automatically
        if (rawUrl.includes("drive.google.com/file/d/")) {
            const fileId = rawUrl.split("/file/d/")[1].split("/")[0];
            processedUrl = `https://docs.google.com/uc?export=download&id=${fileId}`;
        }

        db.collection("rave_parties").doc(currentRoomId).update({
            mediaUrl: processedUrl,
            mediaTitle: "Custom Selected Media File",
            currentTime: 0,
            playing: false,
            lastUpdated: Date.now()
        });
        document.getElementById("targetMediaUrl").value = "";
    }
</script>

</body>
</html>
